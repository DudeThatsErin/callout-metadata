name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Attest main.js
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: main.js

      - name: Attest styles.css
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: styles.css

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            main.js
            styles.css
            manifest.json
